name: robot_controller
description: Native Flutter controller for ESP32-S3 line-following robot
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  cupertino_icons: ^1.0.2
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  shelf: ^1.4.0
  network_info_plus: ^5.0.0
  archive: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
