[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.cpp_std = gnu++17
board_build.psram = enabled
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.f_cpu = 240000000L
monitor_speed = 115200
; deep pulls transitive deps; ESPAsyncWebServer lists AsyncTCP_RP2040W for Pico — ignore on ESP32.
lib_ldf_mode = deep
lib_ignore =
    AsyncTCP_RP2040W
extra_scripts = pre:scripts/pio_pre_tflm.py

; ResNet-8: ~1.2 MiB arena_used — often ends up in PSRAM (slow). For dsep_cnn use env esp32s3-dsep
; or -DTENSOR_ARENA_BYTES=589824 so the arena can fit internal SRAM (try internal first in code).
build_flags =
    -w
    -DTENSOR_ARENA_BYTES=2097152
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DESP_NN
    -DCONFIG_NN_OPTIMIZED=1
    -DCONFIG_IDF_TARGET_ESP32S3=1
    -DTF_LITE_STATIC_MEMORY
    -O3
    -DCORE_DEBUG_LEVEL=0
    -I.pio/libdeps/esp32s3/esp-tflite-micro/third_party/flatbuffers/include
    -I.pio/libdeps/esp32s3/esp-tflite-micro/third_party/gemmlowp
    -I.pio/libdeps/esp32s3/esp-tflite-micro/third_party/kissfft
    -I.pio/libdeps/esp32s3/esp-tflite-micro/third_party/ruy
    -I.pio/libdeps/esp32s3/esp-nn/include
    -I.pio/libdeps/esp32s3/esp-nn/src/common

lib_deps =
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    https://github.com/espressif/esp32-camera
    https://github.com/espressif/esp-tflite-micro
    https://github.com/espressif/esp-nn
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp32s3-dsep]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -DTENSOR_ARENA_BYTES=589824
