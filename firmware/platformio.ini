[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.cpp_std = gnu++17
board_build.psram = enabled
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.f_cpu = 240000000L
monitor_speed = 115200
lib_ldf_mode = deep
lib_ignore =
    AsyncTCP_RP2040W
extra_scripts = pre:scripts/pio_pre_tflm.py

; TENSOR_ARENA_BYTES=112640 (110 KiB): dsep_cnn with first-sep stride 2 keeps arena_used under ~110 KiB for INTERNAL SRAM.
; PSRAM fallback still works if alloc fails. CNN task stack 8 KiB to fit heap after arena.
; -mfix-esp32-psram-cache-issue REMOVED: that workaround is for original ESP32 quad-SPI PSRAM only;
;   ESP32-S3 uses OPI PSRAM which does not have the cache coherency bug. The flag inserts MEMW after
;   every ~16 instructions, causing ~30-50% slowdown on convolution loops — a major INF bottleneck.
; -UCONFIG_ESP_NN_ANSI_C: Arduino BSP sdkconfig.h may define this, disabling esp-nn SIMD → ref C kernels.
;   Explicitly undefine it so esp-nn uses Xtensa SIMD paths on ESP32-S3.
build_flags =
    -w
    -DTENSOR_ARENA_BYTES=112640
    -DBOARD_HAS_PSRAM
    -DESP_NN
    -DCONFIG_IDF_TARGET_ESP32S3=1
    -DCONFIG_NN_OPTIMIZED=1
    -UCONFIG_ESP_NN_ANSI_C
    -DTF_LITE_STATIC_MEMORY
    -O3
    -DCORE_DEBUG_LEVEL=0
    -I.pio/libdeps/esp32s3/esp-tflite-micro/third_party/flatbuffers/include
    -I.pio/libdeps/esp32s3/esp-tflite-micro/third_party/gemmlowp
    -I.pio/libdeps/esp32s3/esp-tflite-micro/third_party/kissfft
    -I.pio/libdeps/esp32s3/esp-tflite-micro/third_party/ruy
    -I.pio/libdeps/esp32s3/esp-nn/include
    -I.pio/libdeps/esp32s3/esp-nn/src/common

lib_deps =
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    https://github.com/espressif/esp32-camera
    https://github.com/espressif/esp-tflite-micro
    https://github.com/espressif/esp-nn
    bblanchon/ArduinoJson @ ^7.0.0
